	<script>
		function cmdName(btn) {

			return span ? span.textContent : btn.textContent;
		}

		let chainMode = false;
		const chainSelected = [];
		const MAX_CHAIN = 5;
		const chainToggle = document.getElementById('chainToggle');
		const chainCopyBtn = document.getElementById('chainCopyBtn');
		const chainClearBtn = document.getElementById('chainClearBtn');

		chainToggle.addEventListener('change', function() {
			chainMode = this.checked;
			if (!chainMode) clearChain();
		});

		chainClearBtn.addEventListener('click', clearChain);

		chainCopyBtn.addEventListener('click', function() {
			const text = chainSelected.map(btn => cmdName(btn)).join(' ');
			navigator.clipboard.writeText(text).then(() => {
				chainCopyBtn.classList.add('copied');
				chainCopyBtn.textContent = 'Copied!';
				setTimeout(() => { chainCopyBtn.classList.remove('copied'); chainCopyBtn.textContent = 'Copy'; }, 600);
			});
		});

		function clearChain() {
			chainSelected.length = 0;
			document.querySelectorAll('.command.chain-selected').forEach(el => {
				el.classList.remove('chain-selected');
				el.removeAttribute('data-chain-order');
			});
			updateChainCopyBtn();
		}

		function updateChainOrder() {
			chainSelected.forEach((btn, i) => btn.setAttribute('data-chain-order', i + 1));
		}

		function updateChainCopyBtn() {
			const has = chainSelected.length > 0;
			chainCopyBtn.classList.toggle('visible', has);
			chainClearBtn.classList.toggle('visible', has);
		}

		function copy(btn) {
			if (chainMode) {
				const idx = chainSelected.indexOf(btn);
				if (idx !== -1) {
					chainSelected.splice(idx, 1);
					btn.classList.remove('chain-selected');
					btn.removeAttribute('data-chain-order');
					updateChainOrder();
				} else if (chainSelected.length < MAX_CHAIN) {
					chainSelected.push(btn);
					btn.classList.add('chain-selected');
					btn.setAttribute('data-chain-order', chainSelected.length);
				}
				updateChainCopyBtn();
			} else {
				navigator.clipboard.writeText(cmdName(btn)).then(() => {
					btn.classList.add('copied');
					setTimeout(() => btn.classList.remove('copied'), 600);
				});

				el.classList.toggle('hidden', !matchesSearch || !matchesFilter);

			}

			sortBtns.forEach(b => {
				const base = {name: 'A-Z', count: 'Most Sounds', type: 'By Type'};
				if (b.dataset.sort === currentSort) {
					if (mode === 'name') b.textContent = sortAsc ? 'A-Z' : 'Z-A';
					else if (mode === 'count') b.textContent = sortAsc ? 'Least Sounds' : 'Most Sounds';
					else b.textContent = sortAsc ? 'By Type' : 'By Type';
				} else {
					b.textContent = base[b.dataset.sort];
				}
			});

			const dir = sortAsc ? 1 : -1;
			const items = [...commandsContainer.querySelectorAll('.command')];
			items.sort((a, b) => {
				if (mode === 'count') return dir * ((parseInt(a.dataset.count) || 0) - (parseInt(b.dataset.count) || 0));
				if (mode === 'type') {
					const tc = dir * a.dataset.type.localeCompare(b.dataset.type);
					return tc !== 0 ? tc : cmdName(a).localeCompare(cmdName(b));
				}
				return dir * cmdName(a).localeCompare(cmdName(b));
			});
			for (const item of items) commandsContainer.appendChild(item);
		}

		sortBtns.forEach(btn => {
			btn.addEventListener('click', function() {
				sortBtns.forEach(b => b.classList.remove('active'));
				this.classList.add('active');
				sortCommands(this.dataset.sort);
			});
		});

		// Filtering
		const filterBtns = document.querySelectorAll('.filter-bar .sort-btn');
		filterBtns.forEach(btn => {
			btn.addEventListener('click', function() {
				filterBtns.forEach(b => b.classList.remove('active'));
				this.classList.add('active');
				applyFilters();
			});
		});

		// Highlight new-today
		const today = new Date().toISOString().slice(0, 10);
		document.querySelectorAll('.command').forEach(el => {
			if (el.dataset.added === today) el.classList.add('new-today');
		});
	</script>
</body>
</html>
