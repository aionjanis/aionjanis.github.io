			padding: 2rem;
		}

			max-width: 900px;
			margin: 0 auto;
		}

		header {
			text-align: center;
			margin-bottom: 2rem;
		}

		h1 {
			font-size: 2rem;
			font-weight: 700;
			margin-bottom: 0.5rem;
		}

		.subtitle {
			color: #adadb8;
			font-size: 1rem;
		}

		.count {
			color: #bf94ff;
			font-weight: 600;
		}

		nav {
			display: flex;
			justify-content: center;
			gap: 0.5rem;
			margin-bottom: 2rem;
			flex-wrap: wrap;
		}

		.nav-link {
			display: inline-block;
			padding: 0.5rem 1rem;
			background: #1f1f23;
			border: 1px solid #303032;
			border-radius: 6px;
			color: #adadb8;
			text-decoration: none;
			font-size: 0.9rem;
			transition: border-color 0.15s, background 0.15s;
		}

		.nav-link:hover {
			border-color: #bf94ff;
			background: #26262c;
			color: #efeff1;
		}

		.nav-link.active {
			border-color: #bf94ff;
			background: #bf94ff22;
			color: #bf94ff;
		}

		footer {
			text-align: center;
			margin-top: 3rem;
			color: #53535f;
			font-size: 0.85rem;
		}

		.search {
			display: block;
			width: 100%;
			max-width: 400px;

			padding: 0.6rem 1rem;
			background: #1f1f23;
			border: 1px solid #303032;
			border-radius: 6px;
			color: #efeff1;
			font-size: 1rem;
			outline: none;
		}

		.search:focus {
			border-color: #bf94ff;
		}

		.commands {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
			gap: 0.6rem;
		}

		.command {
			background: #1f1f23;
			border: 1px solid #303032;
			border-radius: 6px;
			padding: 0.6rem 1rem;
			font-family: 'Consolas', 'Courier New', monospace;
			font-size: 0.95rem;
			text-align: center;
			transition: border-color 0.15s, background 0.15s;
			cursor: pointer;
			user-select: none;
			color: #efeff1;
		}

		.command:hover {
			border-color: #bf94ff;
			background: #26262c;
		}

		.command.copied {
			border-color: #00c853;
			background: #1b3a1b;
		}

		.command.hidden {
			display: none;
		}

		.command.chain-selected {
			border-color: #bf94ff;
			background: #bf94ff22;
			position: relative;
		}

		.command.chain-selected::after {
			content: attr(data-chain-order);
			position: absolute;
			top: -0.4rem;
			right: -0.4rem;
			background: #bf94ff;
			color: #0e0e10;
			font-size: 0.7rem;
			font-weight: 700;
			width: 1.3rem;
			height: 1.3rem;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
		}

		.chain-bar {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 1rem;
			margin-bottom: 1rem;
		}

		.chain-toggle {
			display: flex;
			align-items: center;
			gap: 0.5rem;
			cursor: pointer;
			font-size: 0.9rem;
			color: #adadb8;
			user-select: none;
		}

		.chain-toggle input {
			appearance: none;
			width: 2.4rem;
			height: 1.3rem;
			background: #303032;
			border-radius: 0.65rem;
			position: relative;
			cursor: pointer;
			transition: background 0.2s;
		}

		.chain-toggle input::after {
			content: '';
			position: absolute;
			top: 0.15rem;
			left: 0.15rem;
			width: 1rem;
			height: 1rem;
			background: #adadb8;
			border-radius: 50%;
			transition: transform 0.2s, background 0.2s;
		}

		.chain-toggle input:checked {
			background: #bf94ff44;
		}

		.chain-toggle input:checked::after {
			transform: translateX(1.1rem);
			background: #bf94ff;
		}

		.chain-copy-btn {
			display: none;
			padding: 0.5rem 1.2rem;
			background: #bf94ff;
			color: #0e0e10;
			border: none;
			border-radius: 6px;
			font-size: 0.9rem;
			font-weight: 600;
			cursor: pointer;
			transition: opacity 0.15s;
		}

		.chain-copy-btn:hover {
			opacity: 0.85;
		}

		.chain-copy-btn.visible {
			display: inline-block;
		}

		.chain-copy-btn.copied {
			background: #00c853;
		}

		.chain-clear-btn {
			background: #303032;
			color: #efeff1;
		}

		.chain-clear-btn:hover {
			background: #53535f;
		}
	</style>
</head>

	<script>
		document.getElementById('search').addEventListener('input', function() {
			const q = this.value.toLowerCase();
			document.querySelectorAll('.command').forEach(el => {
				el.classList.toggle('hidden', !el.textContent.toLowerCase().includes(q));
			});
		});

		let chainMode = false;
		const chainSelected = []; // ordered list of selected button elements
		const MAX_CHAIN = 5;
		const chainToggle = document.getElementById('chainToggle');
		const chainCopyBtn = document.getElementById('chainCopyBtn');
		const chainClearBtn = document.getElementById('chainClearBtn');

		chainToggle.addEventListener('change', function() {
			chainMode = this.checked;
			if (!chainMode) {
				clearChain();
			}
		});

		chainClearBtn.addEventListener('click', clearChain);

		chainCopyBtn.addEventListener('click', function() {
			const text = chainSelected.map(btn => btn.textContent).join(' ');
			navigator.clipboard.writeText(text).then(() => {
				chainCopyBtn.classList.add('copied');
				chainCopyBtn.textContent = 'Copied!';
				setTimeout(() => {
					chainCopyBtn.classList.remove('copied');
					chainCopyBtn.textContent = 'Copy';
				}, 600);
			});
		});

		function clearChain() {
			chainSelected.length = 0;
			document.querySelectorAll('.command.chain-selected').forEach(el => {
				el.classList.remove('chain-selected');
				el.removeAttribute('data-chain-order');
			});
			updateChainCopyBtn();
		}

		function updateChainOrder() {
			chainSelected.forEach((btn, i) => {
				btn.setAttribute('data-chain-order', i + 1);
			});
		}

		function updateChainCopyBtn() {
			const hasSelection = chainSelected.length > 0;
			chainCopyBtn.classList.toggle('visible', hasSelection);
			chainClearBtn.classList.toggle('visible', hasSelection);
		}

		function copy(btn) {
			if (chainMode) {
				const idx = chainSelected.indexOf(btn);
				if (idx !== -1) {
					chainSelected.splice(idx, 1);
					btn.classList.remove('chain-selected');
					btn.removeAttribute('data-chain-order');
					updateChainOrder();
				} else if (chainSelected.length < MAX_CHAIN) {
					chainSelected.push(btn);
					btn.classList.add('chain-selected');
					btn.setAttribute('data-chain-order', chainSelected.length);
				}
				updateChainCopyBtn();
			} else {
				navigator.clipboard.writeText(btn.textContent).then(() => {
					btn.classList.add('copied');
					setTimeout(() => btn.classList.remove('copied'), 600);
				});
			}
		}
	</script>
